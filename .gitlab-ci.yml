stages:
  - build
  - publish

default:
  image: node:22

# ── Build ────────────────────────────────────────────────────────────────────
# Runs on every push to main. Lint + compile + publish to GitLab registry.
# The dist/ artifact is passed to the publish job so it does not need to rebuild.
build:
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run lint
    - npm run build
    - echo "${CI_API_V4_URL#*:}/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> ~/.npmrc
    - npm publish --ignore-scripts --registry "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/"
  artifacts:
    paths:
      - dist/
    expire_in: 7 days

# ── Publish ──────────────────────────────────────────────────────────────────
# Manual gate. Requires the build job to have passed.
# Creates a git tag and pushes ONLY that tag to GitHub.
# GitHub Actions (.github/workflows/publish.yml) then handles npm publish
# with provenance, triggered by the tag push.
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   GITHUB_TOKEN — GitHub personal access token with repo scope (mark as masked)
publish:
  stage: publish
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  needs:
    - job: build
      artifacts: true
  before_script:
    - git config user.name "Obiguard CI"
    - git config user.email "support@obiguard.com"
  script:
    # Push source to GitHub. This triggers the GitHub Actions publish
    # workflow which publishes to npm with provenance.
    - git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/obiguard/n8n-nodes-obiguard.git"
    - git push github HEAD:main
  environment:
    name: npm
    url: https://www.npmjs.com/package/@obiguard/n8n-nodes-obiguard
