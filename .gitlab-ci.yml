stages:
  - build
  - publish

default:
  image: node:22

# ── Build ────────────────────────────────────────────────────────────────────
# Runs on every push to main. Lint + compile + publish to GitLab registry.
# The dist/ artifact is passed to the publish job so it does not need to rebuild.
build:
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run lint
    - npm run build
    - npm publish --ignore-scripts --registry "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/"
  artifacts:
    paths:
      - dist/
    expire_in: 7 days

# ── Publish ──────────────────────────────────────────────────────────────────
# Manual gate. Requires the build job to have passed.
# Publishes to npm, then creates a git tag and pushes ONLY that tag to GitHub.
# Intermediate commits on main are never pushed to GitHub.
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   NPM_TOKEN    — npm access token (Automation type, mark as masked)
#   GITHUB_TOKEN — GitHub personal access token with repo scope (mark as masked)
publish:
  stage: publish
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  needs:
    - job: build
      artifacts: true
  variables:
    # Fetch full history so git tag works cleanly
    GIT_DEPTH: 0
  before_script:
    - npm ci
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN_OBIGUARD}" > ~/.npmrc
    - git config user.name "Obiguard CI"
    - git config user.email "support@obiguard.com"
  script:
    # Publish to npm. --ignore-scripts skips prepublishOnly since dist/ is
    # already built and validated by the build job above.
    # --access public is required for scoped packages (@obiguard/...) which
    # default to private on npm without it.
    - npm publish --ignore-scripts --access public

    # Tag the commit that was just released
    - VERSION=$(node -p "require('./package.json').version")
    - TAG="v${VERSION}"
    - git tag -a "${TAG}" -m "Release ${TAG}" HEAD

    # Push only the tag to GitHub — no branch history is pushed
    - git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/obiguard/n8n-nodes-obiguard.git"
    - git push github "${TAG}"
  environment:
    name: npm
    url: https://www.npmjs.com/package/n8n-nodes-obiguard
