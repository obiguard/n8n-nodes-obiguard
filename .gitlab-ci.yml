stages:
  - test
  - build
  - publish

default:
  image: node:22

# ── Test ─────────────────────────────────────────────────────────────────────
# Runs on every push to any branch.
test:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run test:coverage
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    expire_in: 7 days

# ── Build ────────────────────────────────────────────────────────────────────
# Runs on every push to main. Lint + compile + publish to GitLab registry.
# The dist/ artifact is passed to the publish job so it does not need to rebuild.
build:
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - job: test
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run lint
    - npm run build
    - echo "${CI_API_V4_URL#*:}/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> ~/.npmrc
    - npm publish --ignore-scripts --registry "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/"
  artifacts:
    paths:
      - dist/
    expire_in: 7 days

# ── Publish ──────────────────────────────────────────────────────────────────
# Manual gate. Requires the build job to have passed.
# Bumps the patch version, strips .gitlab-ci.yml, and pushes the result to
# GitHub's main branch (this commit/bump is NOT pushed back to GitLab — it
# only ever exists on the GitHub mirror).
# GitHub Actions (.github/workflows/publish.yml) then tags the new version
# and handles npm publish with provenance, triggered by the push to main.
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   GITHUB_TOKEN — GitHub personal access token with repo scope (mark as masked)
publish:
  stage: publish
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  needs:
    - job: build
      artifacts: true
  before_script:
    - git config user.name "Obiguard CI"
    - git config user.email "support@obiguard.com"
  script:
    # Bump the patch version (package.json + package-lock.json). This commit
    # only exists locally on the runner and is never pushed back to GitLab.
    - npm version patch --no-git-tag-version
    # Don't ship the GitLab CI config to the public GitHub mirror.
    - git rm -f .gitlab-ci.yml
    - export RELEASE_VERSION=$(node -p "require('./package.json').version")
    - 'git commit -am "chore: release v${RELEASE_VERSION}"'
    # Push to GitHub. This triggers the GitHub Actions publish workflow,
    # which tags the bumped version and publishes to npm with provenance.
    - git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/obiguard/n8n-nodes-obiguard.git"
    - git push github HEAD:refs/heads/main --force
  environment:
    name: npm
    url: https://www.npmjs.com/package/@obiguard/n8n-nodes-obiguard
